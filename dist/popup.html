<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kairox</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-width: 360px;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f7fb;
        color: #0f172a;
      }
      .wrap {
        padding: 14px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #dbe4f0;
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
      }
      .card + .card,
      .card + .status,
      .status + .card {
        margin-top: 12px;
      }
      .brand {
        margin: 0 0 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #2563eb;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        line-height: 1.2;
      }
      .subtitle {
        font-size: 13px;
        line-height: 1.45;
        color: #64748b;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .toggle-title {
        font-size: 13px;
        font-weight: 700;
        color: #0f172a;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 28px;
        flex: 0 0 auto;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background: #cbd5e1;
        border-radius: 999px;
        transition: 0.2s ease;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 22px;
        height: 22px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s ease;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.18);
      }
      .switch input:checked + .slider {
        background: #2563eb;
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }
      .field:last-of-type {
        margin-bottom: 0;
      }
      label.text-label {
        font-size: 12px;
        color: #475569;
      }
      input[type="password"],
      select {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #fff;
        color: #0f172a;
        padding: 10px 12px;
        font-size: 14px;
        width: 100%;
        min-width: 0;
      }
      input[type="password"]:disabled,
      select:disabled {
        background: #f8fafc;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
      }
      button.primary {
        background: #2563eb;
        color: #fff;
      }
      button.secondary {
        background: #eef2ff;
        color: #1d4ed8;
        border: 1px solid #c7d2fe;
      }
      button.ghost {
        background: #e2e8f0;
        color: #94a3b8;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .status {
        padding: 10px 12px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #dbe4f0;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-wrap;
        color: #334155;
      }
      .status.success {
        border-color: #86efac;
        color: #166534;
        background: #f0fdf4;
      }
      .status.error {
        border-color: #fecaca;
        color: #b91c1c;
        background: #fef2f2;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: #64748b;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="brand">Kairox</div>
        <h1>Автоответы для OZON</h1>
        <div class="subtitle">Введите API-ключ, полученный на сайте kairox.su.</div>
      </div>

      <div class="card">
        <div class="toggle-row">
          <div id="enabledStateLabel" class="toggle-title">Включено</div>
          <label class="switch" for="enabled">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label class="text-label" for="apiKey">API-ключ</label>
          <input id="apiKey" type="password" placeholder="Вставьте API-ключ, полученный на сайте kairox.su" />
        </div>

        <div class="field">
          <label class="text-label" for="mode">Режим</label>
          <select id="mode">
            <option value="standard">Стандарт</option>
            <option value="advanced">Умный</option>
            <option value="expert">Эксперт</option>
          </select>
        </div>

        <div class="actions">
          <button id="saveButton" class="primary">Сохранить</button>
          <button id="checkButton" class="secondary">Проверить</button>
        </div>
      </div>

      <div class="card">
        <button id="autoStartButton" class="ghost" disabled>Запустить автоответ</button>
      </div>

      <div id="status" class="status">Загрузка настроек...</div>

      <div class="card footer">
        <span>Сервис подключается автоматически.</span>
        <a href="https://kairox.su" target="_blank" rel="noreferrer">kairox.su</a>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
