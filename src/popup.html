<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finerox</title>
    <style>
      body {
        margin: 0;
        min-width: 360px;
        font-family: Inter, system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        padding: 16px;
      }
      .brand {
        margin: 0 0 6px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #93c5fd;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.2;
      }
      .subtitle {
        margin-bottom: 14px;
        font-size: 13px;
        line-height: 1.45;
        color: #cbd5e1;
      }
      .toggle-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
        padding: 12px;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
      }
      .toggle-copy {
        min-width: 0;
      }
      .toggle-title {
        font-size: 13px;
        font-weight: 700;
        color: #f8fafc;
      }
      .toggle-hint {
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.45;
        color: #94a3b8;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 28px;
        flex: 0 0 auto;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background: #334155;
        border-radius: 999px;
        transition: 0.2s ease;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 22px;
        height: 22px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s ease;
      }
      .switch input:checked + .slider {
        background: #2563eb;
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }
      label {
        font-size: 12px;
        color: #cbd5e1;
      }
      input[type="password"],
      select {
        border: 1px solid #334155;
        border-radius: 10px;
        background: #111827;
        color: #f8fafc;
        padding: 10px 12px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 14px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }
      button.primary {
        background: #2563eb;
        color: white;
      }
      button.secondary {
        background: #1e293b;
        color: white;
        border: 1px solid #334155;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #111827;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .status.success {
        border: 1px solid #14532d;
        color: #bbf7d0;
      }
      .status.error {
        border: 1px solid #7f1d1d;
        color: #fecaca;
      }
      .footer {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: #94a3b8;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">Finerox</div>
      <h1>Автоответы для OZON</h1>
      <div class="subtitle">Введите API-ключ, полученный на сайте finerox.online.</div>

      <div class="toggle-card">
        <div class="toggle-copy">
          <div class="toggle-title">Расширение включено</div>
          <div class="toggle-hint">
            Когда выключено, Finerox не добавляет свои кнопки и не меняет страницу OZON.
          </div>
        </div>
        <label class="switch" for="enabled">
          <input id="enabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="field">
        <label for="apiKey">API-ключ</label>
        <input id="apiKey" type="password" placeholder="Вставьте API-ключ, полученный на сайте finerox.online" />
      </div>

      <div class="field">
        <label for="mode">Режим</label>
        <select id="mode">
          <option value="standard">Стандарт</option>
          <option value="advanced">Умный</option>
          <option value="expert">Эксперт</option>
        </select>
      </div>

      <div class="actions">
        <button id="saveButton" class="primary">Сохранить</button>
        <button id="checkButton" class="secondary">Проверить</button>
      </div>

      <div id="status" class="status">Загрузка настроек...</div>

      <div class="footer">
        <span>Сервис подключается автоматически.</span>
        <a href="https://finerox.online" target="_blank" rel="noreferrer">finerox.online</a>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
